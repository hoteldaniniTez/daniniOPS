version: '3.8'

services:
  postgres-db:
    image: postgres:17.7
    restart: "no"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432